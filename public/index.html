<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Consulta de Informe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .reveal{opacity:0; transform:translateY(8px); transition:opacity .5s ease, transform .5s ease}
    .reveal.show{opacity:1; transform:none}
    .hidden{display:none}
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="mx-auto max-w-7xl p-8">
    <header class="mb-6">
      <h1 class="text-3xl font-semibold tracking-tight">Consulta tu informe</h1>
      <p class="text-sm text-slate-600">Pregunta y obtén KPIs, gráfico, tabla y explicación.</p>
    </header>

    <!-- Buscador -->
    <div class="flex gap-3">
      <input id="q" class="flex-1 rounded-2xl border border-slate-200 bg-white px-4 py-3 shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
             placeholder="Ej.: ¿Producto estrella del último mes en el punto 22 de Madrid?" />
      <button id="go" class="rounded-2xl bg-indigo-600 px-6 py-3 text-white shadow-sm hover:bg-indigo-500 active:bg-indigo-700">Preguntar</button>
    </div>

    <!-- === RESULTADOS: barra de progreso + secciones === -->
    <section id="results" class="mt-8 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <!-- Barra de progreso (dentro del mismo contenedor que los resultados) -->
      <div id="progressWrap" class="mb-4 hidden">
        <div class="h-2 w-full rounded-full bg-slate-200 overflow-hidden">
          <div id="progressBar" class="h-full w-0 bg-indigo-600"></div>
        </div>
        <p id="progressText" class="mt-1 text-xs text-slate-500">Preparando… 0%</p>
      </div>

      <!-- Indicadores -->
      <section class="mt-2 hidden" id="secKpis">
        <h3 class="mb-3 text-sm font-medium text-slate-600">Indicadores</h3>
        <div id="kpis" class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4"></div>
      </section>

      <!-- Gráfico -->
      <section class="mt-8 hidden" id="secChart">
        <div class="mb-3 flex items-center justify-between">
          <h3 class="text-sm font-medium text-slate-600">Gráfico</h3>
          <select id="chartType" class="rounded-xl border border-slate-200 bg-white px-3 py-1 text-sm">
            <option value="bar">Barras</option>
            <option value="line">Líneas</option>
            <option value="doughnut">Doughnut</option>
            <option value="pie">Tarta</option>
          </select>
        </div>
        <div class="h-96">
          <canvas id="chart" class="reveal h-full w-full"></canvas>
        </div>
      </section>

      <!-- Tabla -->
      <section class="mt-8 hidden" id="secTable">
        <h3 class="mb-3 text-sm font-medium text-slate-600">Tabla</h3>
        <div id="table" class="reveal overflow-auto"></div>
      </section>

      <!-- Explicación al final, debajo de la tabla -->
      <section class="mt-8 hidden" id="secExp">
        <h3 class="mb-3 text-sm font-medium text-slate-600">Explicación</h3>
        <p id="exp" class="reveal text-slate-700"></p>
        <div class="mt-3 flex items-center gap-3">
          <button id="toggleExp" class="hidden text-sm font-medium text-indigo-600 hover:underline">Ver todo</button>
          <button id="copyExp" class="hidden text-sm text-slate-600 hover:underline">Copiar</button>
        </div>
      </section>
    </section>
    <!-- === FIN RESULTADOS === -->
  </div>

  <script>
    const btn = document.getElementById('go');
    const q = document.getElementById('q');
    const exp = document.getElementById('exp');
    const toggleExp = document.getElementById('toggleExp');
    const copyExp = document.getElementById('copyExp');
    const kpis = document.getElementById('kpis');
    const table = document.getElementById('table');
    const chartTypeSel = document.getElementById('chartType');

    // Progreso
    const pWrap = document.getElementById('progressWrap');
    const pBar  = document.getElementById('progressBar');
    const pTxt  = document.getElementById('progressText');

    // Secciones para ocultar/mostrar en bloque
    const secKpis  = document.getElementById('secKpis');
    const secChart = document.getElementById('secChart');
    const secTable = document.getElementById('secTable');
    const secExp   = document.getElementById('secExp');

    let chart;
    let prog = 0, rafId = 0;

    function reveal(el, delay=0){ setTimeout(()=> el?.classList?.add('show'), delay); }
    function revealAll(list, step=80){ list.forEach((node, i)=> reveal(node, i*step)); }

    function hideSections(){
      [secKpis, secChart, secTable, secExp].forEach(s => s.classList.add('hidden'));
    }
    function showSections(){
      [secKpis, secChart, secTable, secExp].forEach(s => s.classList.remove('hidden'));
    }

    // Progreso suave con callback al terminar
    function setBar(val){
      prog = Math.max(0, Math.min(100, val));
      pBar.style.width = prog + '%';
      pTxt.textContent = (prog < 100) ? 'Preparando… ' + Math.floor(prog) + '%' : 'Listo';
    }
    function animateTo(target, ms, done){
      cancelAnimationFrame(rafId);
      const start = performance.now();
      const from  = prog;
      const to    = target;
      const easeInOutQuad = t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
      function step(now){
        const t = Math.min(1, (now - start) / ms);
        const eased = easeInOutQuad(t);
        setBar(from + (to - from) * eased);
        if (t < 1) {
          rafId = requestAnimationFrame(step);
        } else if (typeof done === 'function') {
          done();
        }
      }
      rafId = requestAnimationFrame(step);
    }
    function startProgress(){
      hideSections();
      pWrap.classList.remove('hidden');
      setBar(0);
      // velocidad intermedia
      animateTo(85, 28000);
    }
    function endProgress(){
      animateTo(100, 1800, () => {
        pWrap.classList.add('hidden');
        showSections();
        revealAll([...kpis.children], 80);
        const canvas = document.getElementById('chart');
        if (canvas) reveal(canvas, 150);
        reveal(table, 100);
        reveal(exp, 120);
      });
    }

    // Explicación con truncado/copiar
    function setExplanation(text){
      const full = (text || '').trim();
      const limit = 260;
      const truncated = full.length > limit ? full.slice(0, limit) + '…' : full;

      exp.textContent = truncated || 'Sin explicación.';
      reveal(exp, 50);

      if (full.length > limit) {
        toggleExp.classList.remove('hidden');
        let expanded = false;
        toggleExp.onclick = () => {
          expanded = !expanded;
          exp.textContent = expanded ? full : truncated;
          toggleExp.textContent = expanded ? 'Ver menos' : 'Ver todo';
        };
      } else {
        toggleExp.classList.add('hidden');
      }

      if (full){
        copyExp.classList.remove('hidden');
        copyExp.onclick = async () => {
          try { await navigator.clipboard.writeText(full); copyExp.textContent = 'Copiado'; setTimeout(()=> copyExp.textContent='Copiar', 1200); }
          catch {}
        };
      } else {
        copyExp.classList.add('hidden');
      }
    }

    function kpiCard(k){
      const div = document.createElement('div');
      div.className = 'reveal rounded-xl border border-slate-200 p-5 shadow-sm bg-white';
      div.innerHTML = `<div class="text-sm text-slate-600">${k.nombre}</div>
                       <div class="mt-1 text-3xl font-semibold">${k.valor}</div>
                       <div class="text-xs text-slate-500">${k.periodo||''}</div>`;
      return div;
    }

    function renderTable(rows){
      if (!rows || !rows.length){
        table.innerHTML = '<p class="text-slate-500 text-sm">Sin datos de tabla.</p>';
        return;
      }
      const cols = Object.keys(rows[0]);
      const thead = '<thead class="bg-slate-50"><tr>'+cols.map(c=>`<th class="px-3 py-2 text-left text-xs font-medium text-slate-700">${c}</th>`).join('')+'</tr></thead>';
      const tbody = '<tbody>'+rows.map(r=>'<tr class="border-t">'+cols.map(c=>`<td class="px-3 py-2 text-sm">${r[c]}</td>`).join('')+'</tr>').join('')+'</tbody>';
      table.innerHTML = '<table class="min-w-full text-slate-800">'+thead+tbody+'</table>';
    }

    function buildChart(ctx, tipo, labels, datasets){
      const h = ctx.canvas.height;
      const palette = ['#22c55e','#8b5cf6','#f59e0b','#06b6d4','#ef4444','#3b82f6'];
      const ds = datasets.map((d,i)=>{
        const g = ctx.createLinearGradient(0,0,0,h);
        const c1 = palette[i % palette.length];
        g.addColorStop(0, c1);
        g.addColorStop(1, c1 + '20');
        if (tipo === 'bar'){
          return { ...d, backgroundColor: g, borderColor: c1, borderWidth: 1, borderRadius: 10, maxBarThickness: 40 };
        }
        if (tipo === 'line'){
          return { ...d, borderColor: c1, backgroundColor: g, borderWidth: 3, tension: 0.35, fill: 'start', pointRadius: 0 };
        }
        return { ...d, backgroundColor: labels.map((_,k)=>palette[k % palette.length]) };
      });

      const baseAnim = {
        duration: 900,
        easing: 'easeOutQuart',
        delay: ctx => ctx?.dataIndex != null ? ctx.dataIndex * 60 : 0
      };

      const options = {
        maintainAspectRatio: false,
        animation: (tipo==='pie'||tipo==='doughnut') ? { ...baseAnim, animateRotate:true, animateScale:true } : baseAnim,
        animations: { y: { from: 0 }, tension: { duration: 900, from: 0, to: 0.35 } },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 12, boxHeight: 12 } },
          tooltip: { backgroundColor: '#0f172a', titleColor: '#fff', bodyColor: '#fff', padding: 12, cornerRadius: 10 }
        },
        scales: (tipo==='pie'||tipo==='doughnut') ? {} : {
          x: { grid: { display:false }, ticks:{ color:'#475569' } },
          y: { grid: { color:'#e2e8f0' }, ticks:{ color:'#475569' }, beginAtZero:true }
        },
        elements: { bar: { borderSkipped: false } },
        cutout: (tipo==='doughnut') ? '65%' : undefined
      };

      if (chart) chart.destroy();
      chart = new Chart(ctx, { type: tipo, data: { labels, datasets: ds }, options });
    }

    async function ask() {
      btn.disabled = true; q.disabled = true;

      startProgress(); // controla visibilidad y progreso

      setExplanation('Procesando…');
      kpis.innerHTML = '';
      table.classList.remove('show');
      if (chart) { chart.destroy(); document.getElementById('chart').classList.remove('show'); }

      try {
        const r = await fetch('/api/ask', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ pregunta: q.value })
        });
        if (!r.ok) throw new Error('Error de servidor');

        // Empuja la barra mientras parseamos
        animateTo(96, 4000);

        const data = await r.json();

        // --- Normalización de datos del backend ---
        const g = data?.grafico || {};
        const labels   = Array.isArray(g.labels) ? g.labels : [];
        const datasets = Array.isArray(g.datasets) && g.datasets.length
          ? g.datasets
          : (Array.isArray(g.values) ? [{ label: g.label || 'Serie', data: g.values }] : []);

        // KPIs fallback si no vienen
        if (!Array.isArray(data.kpis) || data.kpis.length === 0) {
          const kpisAuto = [];
          if (Array.isArray(data.tabla)) {
            kpisAuto.push({ nombre: "Filas en tabla", valor: data.tabla.length, periodo: "" });
          } else if (data.tabla?.rows && Array.isArray(data.tabla.rows)) {
            kpisAuto.push({ nombre: "Filas en tabla", valor: data.tabla.rows.length, periodo: "" });
          }
          const serie = datasets?.[0]?.data || [];
          if (serie.length) {
            const total = serie.reduce((a,b)=>a+(+b||0),0);
            kpisAuto.push({ nombre: datasets?.[0]?.label || "Total serie 1", valor: total, periodo: "" });
          }
          data.kpis = kpisAuto;
        }

        // --- Pintado ---
        setExplanation(data.explicacion || '');

        (function pintarKpis(list){
          kpis.innerHTML = '';
          (list||[]).forEach(k => kpis.appendChild(kpiCard(k)));
        })(data.kpis);

        (function pintarGrafico(){
          const canvas = document.getElementById('chart');
          const ctx = canvas.getContext('2d');
          if (labels.length && datasets.length) {
            buildChart(ctx, chartTypeSel.value || g.tipo || 'bar', labels, datasets);
          }
        })();

        (function pintarTabla(tb){
          if (Array.isArray(tb)) {
            renderTable(tb); return;
          }
          if (tb?.rows && Array.isArray(tb.rows)) {
            const headers = Array.isArray(tb.headers) ? tb.headers : [];
            const rows = tb.rows.map(r => Object.fromEntries(r.map((v,i)=>[headers[i] ?? `Col ${i+1}`, v])));
            renderTable(rows); return;
          }
          renderTable([]);
        })(data.tabla);

        endProgress(); // muestra secciones al completar 100%
      } catch (e) {
        setExplanation('Error: ' + e.message);
        endProgress();
      } finally {
        btn.disabled = false; q.disabled = false;
      }
    }

    btn.onclick = ask;
    q.addEventListener('keydown', e=>{ if(e.key==='Enter') ask(); });
    chartTypeSel.addEventListener('change', ()=>{
      const canvas = document.getElementById('chart');
      const ctx = canvas.getContext('2d');
      if (!chart || !chart.data || !chart.data.labels?.length) return;
      buildChart(ctx, chartTypeSel.value, chart.data.labels, chart.data.datasets.map(d=>({label:d.label, data:d.data})));
    });
  </script>
</body>
</html>
